<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Feishu Copy 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Feishu Copy 设置</h1>

    <section class="section">
      <h2>关于转存到飞书云盘</h2>
      <p class="hint">
        转存功能使用当前飞书页面的登录态（Cookie），无需配置 API 凭证。<br>
        请确保在飞书文档页面已登录，点击"转存到飞书云盘"时会弹出文件夹选择器。
      </p>
    </section>

    <section class="section">
      <h2>默认文件夹</h2>
      <p class="hint">
        设置默认文件夹后可跳过选择器直接创建。留空则每次弹出选择器。<br>
        文件夹 Token 可从飞书云盘 URL 中获取，格式如：
        <code>https://feishu.cn/drive/folder/&lt;folder_token&gt;</code>
      </p>

      <div class="form-group">
        <label for="folder-token">Folder Token（可选）</label>
        <input type="text" id="folder-token" placeholder="fldcnxxxxxxxxx">
      </div>

      <div class="form-group" style="margin-top:12px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="skip-picker">
          跳过文件夹选择器，直接使用默认文件夹
        </label>
      </div>
    </section>

    <div class="actions">
      <button id="save-btn" class="btn-primary">保存设置</button>
      <span id="save-result" class="save-result"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
